<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrations Closed — TAKEOVER 2026</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <script type="module">
    import { init } from '/src/shared.js';
    import { BROCHURE_URL } from '/src/data.js';
    init({ withLoader: false }).then(() => {
        document.getElementById('brochureBtn').href = BROCHURE_URL;
    });
  </script>
  <style>
    .closed-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .closed-title {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: clamp(1.5rem, 7vw, 4.5rem);
      font-family: var(--font-display, "CasualPassionDemo", sans-serif);
      font-weight: 400;
      margin-bottom: 1rem;
      text-transform: none;
      letter-spacing: 0px;
      line-height: 1.1;
      width: 100%;
      padding: 0 10px;
      box-sizing: border-box;
      overflow-wrap: break-word;
    }
    .closed-title .accent {
      color: var(--accent-red, #e53935);
    }
    .closed-msg {
      font-family: var(--font-ui, "Orbitron", sans-serif);
      font-size: clamp(14px, 2vw, 16px);
      font-weight: 400;
      color: var(--text-muted, rgba(255, 255, 255, 0.7));
      margin-bottom: 2.5rem;
      max-width: 600px;
      line-height: 1.6;
      letter-spacing: 1px;
    }
    .closed-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .closed-icon {
      font-size: 3.5rem;
      color: var(--accent-red, #e53935);
      margin-bottom: 1.5rem;
    }

    @media (max-width: 600px) {
      .closed-actions {
        flex-direction: column;
        width: 100%;
        max-width: 320px;
        margin: 0 auto;
      }
      .closed-actions .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="closed-page fade-in">
    <div class="closed-icon">
      <i class="fa-solid fa-lock"></i>
    </div>
    <h1 class="closed-title">
      <span>Registrations</span>
      <span class="accent">Closed</span>
    </h1>
    <p class="closed-msg">The stage isn't going anywhere, but the gates are temporarily locked. Hold tight — registrations will open soon. Keep your crew ready!</p>
    <div class="closed-actions">
      <a href="#" id="brochureBtn" target="_blank" rel="noreferrer" class="btn btn-primary">
        <i class="fa-solid fa-download"></i> Download Brochure
      </a>
      <a href="/index.html#helpdesk" class="btn btn-ghost">
        <i class="fa-solid fa-headset"></i> Need Help?
      </a>
    </div>
  </main>
</body>
</html>
